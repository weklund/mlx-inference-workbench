name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-rust:
    name: Check for Rust code
    runs-on: ubuntu-latest
    outputs:
      has-rust: ${{ steps.check.outputs.has-rust }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          if [ -f Cargo.toml ]; then
            echo "has-rust=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-rust=false" >> "$GITHUB_OUTPUT"
          fi

  lint-python:
    name: Lint (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  lint-rust:
    name: Lint (Rust)
    runs-on: ubuntu-latest
    needs: check-rust
    if: needs.check-rust.outputs.has-rust == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings

  semver-check:
    name: API Compatibility (cargo-semver-checks)
    runs-on: ubuntu-latest
    needs: check-rust
    if: needs.check-rust.outputs.has-rust == 'true' && github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: obi1kenobi/cargo-semver-checks-action@v2

  test-python:
    # Name is a required status check on main (see branch ruleset).
    # Coverage failure exits non-zero and blocks merge.
    name: Test + Coverage (Python)
    runs-on: macos-latest
    needs: lint-python
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen --extra dev
      # Coverage gate (#23): workbench package only.
      # Overall fail_under=80 (pyproject + explicit --cov-fail-under).
      # Per-module floors: scripts/check_core_coverage.py (scripts/CLI not gated).
      - name: Unit tests + coverage (fail under 80%)
        run: |
          set -euo pipefail
          uv run pytest -m "not gpu and not slow" --tb=short \
            --cov=workbench \
            --cov-report=term-missing \
            --cov-report=json:coverage.json \
            --cov-fail-under=80
      - name: Core module coverage floors
        run: |
          set -euo pipefail
          uv run python scripts/check_core_coverage.py

  test-rust:
    name: Test (Rust)
    runs-on: macos-latest
    needs: [check-rust, lint-rust]
    if: needs.check-rust.outputs.has-rust == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test

  integration:
    name: Integration Tests
    runs-on: macos-latest
    needs: [check-rust, test-python, test-rust]
    if: |
      always() &&
      needs.test-python.result == 'success' &&
      (needs.test-rust.result == 'success' || needs.test-rust.result == 'skipped')
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - uses: dtolnay/rust-toolchain@stable
        if: needs.check-rust.outputs.has-rust == 'true'
      - name: Build Rust bindings
        if: needs.check-rust.outputs.has-rust == 'true'
        run: |
          uv pip install maturin
          uv run maturin develop --release
      - run: uv sync --frozen --extra dev
      - run: uv run pytest -m "integration" --tb=short || [ $? -eq 5 ]

  commitlint:
    name: Commit Messages
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install @commitlint/cli @commitlint/config-conventional
      - run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }}
