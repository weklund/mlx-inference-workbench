name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: checkout + local tooling only. No job opens PRs, pushes,
# uploads packages, or mutates checks beyond the default job status.
permissions:
  contents: read

jobs:
  check-rust:
    name: Check for Rust code
    runs-on: ubuntu-latest
    outputs:
      has-rust: ${{ steps.check.outputs.has-rust }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          if [ -f Cargo.toml ]; then
            echo "has-rust=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-rust=false" >> "$GITHUB_OUTPUT"
          fi

  lint-python:
    name: Lint (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      # Same recipe as local: make lint (see Makefile)
      - run: make sync
      - run: make lint

  lint-rust:
    name: Lint (Rust)
    runs-on: ubuntu-latest
    needs: check-rust
    if: needs.check-rust.outputs.has-rust == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings

  # cargo-semver-checks needs a git baseline package. Skip publish=false crates and
  # packages that do not exist at the PR base (new crates — no prior API to break).
  # Existing publishable crates are checked with --baseline-rev (no crates.io required).
  semver-check:
    name: API Compatibility (cargo-semver-checks)
    runs-on: ubuntu-latest
    needs: check-rust
    if: needs.check-rust.outputs.has-rust == 'true' && github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: Detect publishable workspace packages
        id: pubs
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          ROOT="$(pwd)"
          # publish == null → default (publishable); publish == [] → publish = false
          # Only keep packages whose Cargo.toml exists at the PR base (check-release
          # needs a baseline API; brand-new crates are logged and skipped).
          KEEP=""
          while IFS="$(printf '\t')" read -r name manifest; do
            [ -z "${name:-}" ] && continue
            rel="${manifest#"$ROOT"/}"
            if git cat-file -e "${BASE}:${rel}" 2>/dev/null; then
              KEEP="${KEEP}${KEEP:+ }${name}"
              echo "Include $name (manifest exists at baseline: $rel)"
            else
              echo "Skip $name — new package (no $rel at baseline $BASE); not running check-release"
            fi
          done < <(cargo metadata --no-deps --format-version=1 | jq -r '
            .packages[]
            | select(.source == null)
            | select(.publish == null or (.publish | length > 0))
            | "\(.name)\t\(.manifest_path)"
          ')
          if [ -z "$KEEP" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "No publishable packages present at baseline. Skipping cargo-semver-checks."
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "packages=$KEEP" >> "$GITHUB_OUTPUT"
            echo "Will check: $KEEP"
          fi
      - name: Install cargo-semver-checks
        if: steps.pubs.outputs.run == 'true'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-semver-checks
      - name: Check API compatibility vs PR base
        if: steps.pubs.outputs.run == 'true'
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          for pkg in ${{ steps.pubs.outputs.packages }}; do
            echo "::group::semver-checks $pkg (baseline $BASE)"
            cargo semver-checks check-release -p "$pkg" --baseline-rev "$BASE"
            echo "::endgroup::"
          done

  test-python:
    # Name is a required status check on main (branch protection).
    # Coverage failure exits non-zero and blocks merge.
    # Recipe must stay identical to local: make coverage
    name: Test + Coverage (Python)
    runs-on: macos-latest
    needs: lint-python
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: make sync
      - name: Unit tests + coverage gate
        run: make coverage

  test-rust:
    name: Test (Rust)
    runs-on: macos-latest
    needs: [check-rust, lint-rust]
    if: needs.check-rust.outputs.has-rust == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test

  integration:
    name: Integration Tests
    runs-on: macos-latest
    needs: [check-rust, test-python, test-rust]
    if: |
      always() &&
      needs.test-python.result == 'success' &&
      (needs.test-rust.result == 'success' || needs.test-rust.result == 'skipped')
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - uses: dtolnay/rust-toolchain@stable
        if: needs.check-rust.outputs.has-rust == 'true'
      - name: Build Rust workspace
        if: needs.check-rust.outputs.has-rust == 'true'
        run: cargo build --workspace --release
      # PyO3 / maturin develop only when a maturin package exists (Phase 3+)
      - name: Build PyO3 bindings (if configured)
        if: needs.check-rust.outputs.has-rust == 'true'
        run: |
          if grep -rq 'maturin' --include='Cargo.toml' --include='pyproject.toml' . 2>/dev/null \
            && grep -rq 'pyo3' --include='Cargo.toml' . 2>/dev/null; then
            uv pip install maturin
            uv run maturin develop --release
          else
            echo "No PyO3 package yet — skip maturin"
          fi
      - run: make sync
      - run: make test-integration

  commitlint:
    name: Commit Messages
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install @commitlint/cli @commitlint/config-conventional
      - run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }}
