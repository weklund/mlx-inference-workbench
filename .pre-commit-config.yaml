# Install all hook types so range commitlint runs on push:
#   uv run pre-commit install --install-hooks
#   # or: uv run pre-commit install --hook-type pre-commit --hook-type commit-msg --hook-type pre-push
default_install_hook_types: [pre-commit, commit-msg, pre-push]

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Keep in lockstep with the ruff version from `uv run ruff --version`
    # (or the nearest ruff-pre-commit tag). See docs/notes/python-lint.md.
    rev: v0.15.21
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.18.0
    hooks:
      # Single new commit (message file). Does not scan branch history.
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ["@commitlint/config-conventional"]

  - repo: local
    hooks:
      # Full branch range — same idea as CI commitlint job (catches bad merges).
      - id: commitlint-range
        name: commitlint (branch range vs main)
        entry: bash scripts/commitlint_range.sh
        language: node
        additional_dependencies:
          - "@commitlint/cli@19.8.1"
          - "@commitlint/config-conventional@19.8.1"
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      # Run when Rust sources, Cargo manifests, or MSL shaders change.
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all -- --check
        language: system
        files: '(\.rs$|Cargo\.(toml|lock)|\.metal$)'
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --workspace --all-targets --all-features -- -D warnings
        language: system
        files: '(\.rs$|Cargo\.(toml|lock)|\.metal$)'
        pass_filenames: false

      - id: cargo-test
        name: cargo test
        entry: cargo test --workspace
        language: system
        files: '(\.rs$|Cargo\.(toml|lock)|\.metal$)'
        pass_filenames: false

      - id: cargo-doc
        name: cargo doc (no-deps, deny warnings)
        entry: bash -c 'RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps'
        language: system
        files: '(\.rs$|Cargo\.(toml|lock))'
        pass_filenames: false
