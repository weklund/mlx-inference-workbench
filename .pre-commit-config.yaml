repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Keep in lockstep with the ruff version from `uv run ruff --version`
    # (or the nearest ruff-pre-commit tag). See docs/notes/python-lint.md.
    rev: v0.15.21
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.18.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ["@commitlint/config-conventional"]

  - repo: local
    hooks:
      # Run when Rust sources, Cargo manifests, or MSL shaders change.
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all -- --check
        language: system
        files: '(\.rs$|Cargo\.(toml|lock)|\.metal$)'
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --workspace --all-targets --all-features -- -D warnings
        language: system
        files: '(\.rs$|Cargo\.(toml|lock)|\.metal$)'
        pass_filenames: false

      - id: cargo-test
        name: cargo test
        entry: cargo test --workspace
        language: system
        files: '(\.rs$|Cargo\.(toml|lock)|\.metal$)'
        pass_filenames: false

      - id: cargo-doc
        name: cargo doc (no-deps, deny warnings)
        entry: bash -c 'RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps'
        language: system
        files: '(\.rs$|Cargo\.(toml|lock))'
        pass_filenames: false
