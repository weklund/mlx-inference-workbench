schema_version: "1.0"

experiment:
  name: "protocol-baseline-mlx-lm-qwen3-8b-4bit"
  description: >
    Thermal-protocol performance baseline on agentic_coding_v1 (capped prompts):
    exclusive session, AC, high performance, powermetrics (#3). HLD warmup ≥10.
    Correctness gate OFF — agentic_coding_v1 has no gold reference fields yet;
    re-enable require_correctness when references exist. See
    experiments/01_baseline_m5max/README.md. Raw completion prompts; temp=0; seed=42.

hardware:
  profile: "m5_max_128gb"

model:
  name: "qwen3-8b"
  model_id: "mlx-community/Qwen3-8B-4bit"
  quantization: "4bit"
  backend: "mlx-lm"
  max_tokens: 128

benchmark:
  # HLD §10 example: warmup ≥10 for published measurement runs.
  warmup_iterations: 10
  timed_iterations: 5
  per_iteration_timeout_sec: 300
  prompt_dataset: "datasets/agentic_coding_v1.jsonl"
  prompt_checksum: "datasets/agentic_coding_v1.sha256"
  cooldown_between_runs_sec: 30
  monitor_thermal: true
  abort_if_throttling: true
  # Cap for wall-clock; remove max_prompts for full 24-prompt sweep.
  max_prompts: 8
  # Blocked until dataset rows carry non-empty `reference` (0/24 today).
  require_correctness: false

metrics:
  report_percentiles: [50, 90, 95, 99]
  flag_cov_threshold: 0.05

reproducibility:
  random_seed: 42
  record_git_commit: true
  record_env_versions: true

results_dir: "benchmarks/results"
enable_mlflow: true
