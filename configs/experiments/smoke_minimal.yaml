schema_version: "1.0"

experiment:
  name: "smoke-stub-minimal"
  description: "Offline smoke test using stub engine (no GPU/model weights)"

hardware:
  profile: "m5_max_128gb"

model:
  name: "stub-model"
  quantization: "n/a"
  backend: "stub"
  max_tokens: 16

benchmark:
  warmup_iterations: 1
  timed_iterations: 5
  per_iteration_timeout_sec: 30
  prompt_dataset: "datasets/smoke_v1.jsonl"
  prompt_checksum: "datasets/smoke_v1.sha256"
  cooldown_between_runs_sec: 0
  monitor_thermal: false
  abort_if_throttling: false
  max_prompts: 2
  # smoke dataset has no gold outputs; set true + JSONL "reference" for real gates
  require_correctness: false

metrics:
  report_percentiles: [50, 90, 95, 99]
  flag_cov_threshold: 0.05

reproducibility:
  random_seed: 42
  record_git_commit: true
  record_env_versions: true

results_dir: "benchmarks/results"
enable_mlflow: false
